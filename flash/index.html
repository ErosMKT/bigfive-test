<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anima | Big Five Assessment Flash</title>
  <!-- Plus Jakarta Sans via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Chart.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    /* Reset and Core Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f172a;
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,20%,0.25) 0, transparent 50%),
        radial-gradient(at 100% 0%, hsla(263,45%,15%,0.15) 0, transparent 50%);
      color: #f8fafc;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
      position: relative;
    }

    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -10;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.06) 0%, rgba(15, 23, 42, 0) 65%);
    }

    /* Webkit scrollbars styling */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }

    /* Header & Branding */
    .quiz-header {
      width: 100%;
      max-width: 680px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      animation: fadeIn 0.6s ease forwards;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      background: #6366f1;
      border-radius: 50%;
      box-shadow: 0 0 12px #6366f1;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #ffffff;
      text-transform: uppercase;
    }

    .lang-select {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
    }

    .lang-select:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .lang-select option {
      background: #0f172a;
      color: #ffffff;
      font-weight: normal;
    }

    /* Main Container Card */
    .card {
      background: #ffffff;
      color: #1e293b;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      color: #0f172a;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 15px;
      line-height: 1.6;
      color: #475569;
      text-align: center;
      margin-bottom: 32px;
      max-width: 480px;
      align-self: center;
    }

    /* Input group styles */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 700;
      color: #475569;
      text-align: left;
    }

    .input-field {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
      background: #f8fafc;
    }

    .input-field:focus {
      border-color: #6366f1;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    /* Scrollable Question Area */
    .questions-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 52vh;
      overflow-y: auto;
      padding-right: 12px;
      margin-bottom: 24px;
    }

    .question-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.25s ease;
    }

    .question-card:hover {
      border-color: #cbd5e1;
      box-shadow: 0 8px 16px -8px rgba(0,0,0,0.05);
      background: #ffffff;
    }

    .question-text {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.5;
      text-align: left;
    }

    /* Form Option Buttons */
    .options {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .btn-option {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      color: #64748b;
      padding: 12px 6px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: center;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
      min-height: 48px;
    }

    .btn-option:hover {
      background: #f1f5f9;
      color: #334155;
      border-color: #cbd5e1;
    }

    .btn-option.selected {
      background: #6366f1;
      color: #ffffff;
      border-color: #6366f1;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
    }

    /* Submit / Action Buttons */
    .btn-calculate {
      background: #6366f1;
      color: #ffffff;
      border: none;
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 12px;
      outline: none;
    }

    .btn-calculate:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.35);
    }

    .btn-calculate:active {
      transform: translateY(0);
    }

    /* Results layout - Optimizing Chart.js container */
    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0 28px;
      overflow: visible;
    }

    .chart-wrapper canvas {
      overflow: visible;
    }

    .analysis-container {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 24px;
      width: 100%;
      margin-bottom: 20px;
    }

    .analysis-title {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .analysis-text {
      font-size: 14px;
      color: #334155;
      line-height: 1.6;
      text-align: left;
    }

    /* Recruiter Data Box Area */
    .recruiter-box {
      background: #f1f5f9;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      padding: 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }

    .recruiter-header {
      font-size: 13px;
      font-weight: 800;
      color: #475569;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .recruiter-data {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      color: #1e293b;
      white-space: pre-wrap;
      text-align: left;
      line-height: 1.5;
    }

    .quiz-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 13px;
      color: #64748b;
      max-width: 680px;
      animation: fadeIn 0.6s ease forwards;
    }

    /* Responsiveness adjustments */
    @media (max-width: 640px) {
      html {
        font-size: 14px;
      }
      .card {
        padding: 32px 20px;
        border-radius: 20px;
      }
      .title {
        font-size: 24px;
      }
      .questions-list {
        max-height: 48vh;
        padding-right: 6px;
      }
      .question-card {
        padding: 16px;
      }
      /* Stacking Likert options vertically on mobile for touch comfort */
      .options {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .btn-option {
        padding: 12px 16px;
        font-size: 13px;
        min-height: auto;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  
  <header class="quiz-header">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Anima Flash</span>
    </div>
    <select id="lang-select" class="lang-select" onchange="changeLanguage()">
      <option value="en">EN</option>
      <option value="pt">PT</option>
      <option value="es">ES</option>
      <option value="it">IT</option>
      <option value="fr">FR</option>
      <option value="de">DE</option>
      <option value="tr">TR</option>
    </select>
  </header>

  <!-- ENTRY SECTION -->
  <main id="entry-section" class="card">
    <h1 id="txt-entry-title" class="title">Big Five Assessment</h1>
    <p id="txt-entry-subtitle" class="subtitle">Quick neurocognitive personality profiling tool.</p>
    
    <form id="entry-form" onsubmit="startTest(event)">
      <div class="input-group">
        <label for="input-firstname" class="input-label" id="lbl-firstname">First Name</label>
        <input type="text" id="input-firstname" class="input-field" required placeholder="e.g. John">
      </div>
      <div class="input-group">
        <label for="input-surname" class="input-label" id="lbl-surname">Surname</label>
        <input type="text" id="input-surname" class="input-field" required placeholder="e.g. Smith">
      </div>
      
      <button type="submit" id="btn-start" class="btn-calculate">
        Start Assessment
      </button>
    </form>
  </main>

  <!-- QUIZ SECTION -->
  <main id="quiz-section" class="card" style="display: none;">
    <h1 id="txt-quiz-title" class="title">Big Five Assessment</h1>
    <p id="txt-quiz-subtitle" class="subtitle">Please read and answer all questions honestly.</p>
    
    <div id="questions-container" class="questions-list">
      <!-- Dynamic list of questions -->
    </div>
    
    <button id="btn-calc" class="btn-calculate" onclick="calculateResult()">
      Generate Report
    </button>
  </main>

  <!-- RESULT SECTION -->
  <main id="result-section" class="card" style="display: none;">
    <h1 id="txt-res-title" class="title">Your Neurocognitive Profile</h1>
    
    <div class="chart-wrapper">
      <canvas id="radarChart"></canvas>
    </div>
    
    <!-- Candidate Area 1 -->
    <div class="analysis-container">
      <h3 class="analysis-title">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; stroke: #6366f1;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 .364l-.707 .707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548 .547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
        </svg>
        <span id="txt-analysis-header">Personal Assessment</span>
      </h3>
      <div id="txt-feedback-content" class="analysis-text">
        <!-- Feedback content goes here -->
      </div>
    </div>
    
    <!-- Recruiter Area 2 (Compact Data) -->
    <div class="recruiter-box">
      <h3 class="recruiter-header" id="txt-rec-header">Recruiter Data</h3>
      <div id="txt-rec-data" class="recruiter-data"></div>
      <button onclick="copyRecruiterData(this)" id="btn-copy" class="btn-calculate" style="margin-top: 6px; background: #475569; font-size: 13px; padding: 10px 16px; width: 100%;">
        Copy Data
      </button>
    </div>
    
    <button class="btn-calculate" style="margin-top: 24px;" onclick="location.reload()">
      Retake Test
    </button>
  </main>

  <footer class="quiz-footer">
    <p>© 2026 Anima Flash. Scientific Big Five personality framework.</p>
  </footer>

    function getRandomSubarray(arr, size) {
      let shuffled = arr.slice(0), i = arr.length, temp, index;
      while (i--) {
        index = Math.floor((i + 1) * Math.random());
        temp = shuffled[index];
        shuffled[index] = shuffled[i];
        shuffled[i] = temp;
      }
      return shuffled.slice(0, size);
    }

    function selectActiveQuestions() {
      const openQs = getRandomSubarray(valencePools.openness, 3).map(q => ({ ...q, valence: 'O' }));
      const consQs = getRandomSubarray(valencePools.conscientiousness, 3).map(q => ({ ...q, valence: 'C' }));
      const extQs = getRandomSubarray(valencePools.extraversion, 3).map(q => ({ ...q, valence: 'E' }));
      const agrQs = getRandomSubarray(valencePools.agreeableness, 3).map(q => ({ ...q, valence: 'A' }));
      const neuQs = getRandomSubarray(valencePools.neuroticism, 3).map(q => ({ ...q, valence: 'N' }));
      
      const rawSelection = [...openQs, ...consQs, ...extQs, ...agrQs, ...neuQs];
      activeQuestions = getRandomSubarray(rawSelection, 15);
      userAnswers = Array(15).fill(3);
    }

    function renderQuestions() {
      const container = document.getElementById("questions-container");
      if (!container) return;
      container.innerHTML = "";
      
      const t = translations[currentLang] || translations["en"];
      
      activeQuestions.forEach((q, index) => {
        const qCard = document.createElement("div");
        qCard.className = "question-card";
        
        const questionText = questionsTranslations[q.key][currentLang] || questionsTranslations[q.key]["en"];
        
        qCard.innerHTML = `
            <div class="question-text">${questionText}</div>
            <div class="options">
                <button class="btn-option ${userAnswers[index] === 1 ? 'selected' : ''}" onclick="selectOption(${index}, 1)">${t.opt1}</button>
                <button class="btn-option ${userAnswers[index] === 2 ? 'selected' : ''}" onclick="selectOption(${index}, 2)">${t.opt2}</button>
                <button class="btn-option ${userAnswers[index] === 3 ? 'selected' : ''}" onclick="selectOption(${index}, 3)">${t.opt3}</button>
                <button class="btn-option ${userAnswers[index] === 4 ? 'selected' : ''}" onclick="selectOption(${index}, 4)">${t.opt4}</button>
                <button class="btn-option ${userAnswers[index] === 5 ? 'selected' : ''}" onclick="selectOption(${index}, 5)">${t.opt5}</button>
            </div>`;
        container.appendChild(qCard);
      });
    }

    function selectOption(qIndex, val) { 
      userAnswers[qIndex] = val;

      activeQuestions.forEach((q, index) => {
        const val = userAnswers[index];
        const score = q.type === "normal" ? mapScore(val) : mapInverse(val);
        valenceTotals[q.valence] += score;
      });
      
      const scoreO = valenceTotals.O / 3;
      const scoreC = valenceTotals.C / 3;
      const scoreE = valenceTotals.E / 3;
      const scoreA = valenceTotals.A / 3;
      const scoreN = valenceTotals.N / 3;
      
      const ctx = document.getElementById("radarChart").getContext("2d");
      const t = translations[currentLang] || translations["en"];
      
      if (myChart) {
        myChart.destroy();
      }

      myChart = new Chart(ctx, {
        type: "radar",
        data: {
          labels: t.labels,
          datasets: [{
            label: "Espectro FFM",
            data: [scoreO, scoreC, scoreE, scoreA, scoreN],
            backgroundColor: "rgba(99, 102, 241, 0.15)",
            borderColor: "rgba(99, 102, 241, 1)",
            borderWidth: 3,
            pointBackgroundColor: "rgba(99, 102, 241, 1)",
            pointBorderColor: "#ffffff",
            pointBorderWidth: 1.5,
            pointRadius: 4.5,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: {
            padding: {
              left: 35,
              right: 35,
              top: 25,
              bottom: 25
            }
          },
          scales: {
            r: {
              angleLines: { display: true, color: "#e2e8f0" },
              grid: { color: "#e2e8f0" },
              pointLabels: { 
                font: { size: 12, weight: "bold", family: "Plus Jakarta Sans" }, 
                color: "#1e293b",
                padding: 12
              },
              suggestedMin: 0, 
              suggestedMax: 100, 
              ticks: { display: false }
            }
          },
          plugins: { 
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return context.raw.toFixed(1) + "%";
                }
              }
            }
          }
        }
      });
      
      document.getElementById("txt-feedback-content").innerText = t.feedback;
      
      const dateStr = new Date().toLocaleDateString(currentLang, { year: 'numeric', month: 'long', day: 'numeric' });
      const recDataStr = `Candidate: ${candidateName}
Date: ${dateStr}

Big Five Valence Scores:
- Openness: ${scoreO.toFixed(1)}%
- Conscientiousness: ${scoreC.toFixed(1)}%
- Extraversion: ${scoreE.toFixed(1)}%
- Agreeableness: ${scoreA.toFixed(1)}%
- Neuroticism: ${scoreN.toFixed(1)}%`;

      document.getElementById("txt-rec-data").innerText = recDataStr;
    }

    function copyRecruiterData(btn) {
      const dataText = document.getElementById("txt-rec-data").innerText;
      navigator.clipboard.writeText(dataText).then(() => {
        const t = translations[currentLang] || translations["en"];
        const originalText = btn.innerText;
        btn.innerText = t.copySuccess || "Copied !";
        btn.style.background = "#059669";
        setTimeout(() => {
          btn.innerText = originalText;
          btn.style.background = "#475569";
        }, 2000);
      }).catch(err => {
        console.error("Copy failed:", err);
      });
    }

    window.onload = function() {
      document.getElementById("lang-select").value = "en";
      changeLanguage();
    };
  </script>
</body>
</html>
